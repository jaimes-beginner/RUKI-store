server:
  port: 8000

spring:
  application:
    name: ruki-gateway
  cloud:
    gateway:
      
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "${FRONTEND_URL:http://localhost:5173}"
              - "http://localhost:3000" 
            allowedHeaders: "*"
            allowedMethods: "*"
            allowCredentials: true

      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api-ruki/auth/**,/api-ruki/users/**,/api-ruki/addresses/**

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api-ruki/products/**,/api-ruki/categories/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api-ruki/orders/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api-ruki/payments/**

        - id: user-service-docs
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - SetPath=/v3/api-docs

        - id: product-service-docs
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/product
          filters:
            - SetPath=/v3/api-docs

        - id: order-service-docs
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/order
          filters:
            - SetPath=/v3/api-docs

        - id: payment-service-docs
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/payment
          filters:
            - SetPath=/v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /v3/api-docs/user
      - name: Product Service
        url: /v3/api-docs/product
      - name: Order Service
        url: /v3/api-docs/order
      - name: Payment Service
        url: /v3/api-docs/payment