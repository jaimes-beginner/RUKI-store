spring.application.name=user
server.port=8080

# --- BASE DE DATOS ---
spring.datasource.url=${DB_URL:jdbc:postgresql://db.vjimgzqcvmevoqorpkfk.supabase.co:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- JWT Y SEGURIDAD ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# Dinámico: CORS para React
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

server.forward-headers-strategy=framework

# Forzar a la interfaz de Swagger a usar la ruta exacta de DigitalOcean
springdoc.swagger-ui.configUrl=/ruki-store-ruki-backend-user/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/ruki-store-ruki-backend-user/v3/api-docs