spring.application.name=order
server.port=8082

# BASE DE DATOS
spring.datasource.url=${DB_URL:jdbc:postgresql://db.vjimgzqcvmevoqorpkfk.supabase.co:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Y SEGURIDAD
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# Dinámico: En la nube usará tu URL de Vercel/Netlify, en PC usará localhost
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# COMUNICACIÓN CON OTROS MICROSERVICIOS (FEIGN)
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Dinámico: En la nube leerá la URL del servidor de Productos
app.clients.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}
app.clients.user-service.url=${USER_SERVICE_URL:http://usuarios-service:8080}

server.forward-headers-strategy=framework

# STRIPE CONFIGURATIO
stripe.api.key=${STRIPE_SECRET_KEY}

# URL del frontend para que Stripe redirija al usuario al terminar
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# URL del Order Service para avisarle cuando un pago sea exitoso
app.clients.order-service.url=${ORDER_SERVICE_URL:http://localhost:8082}

# MAIL | SMTP CONFIGURATION (GMAIL) 
spring.mail.host=smtp.resend.com
spring.mail.port=2525
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.required=true

# El correo desde donde se envían 
# (aún no tenemos el dominio, entonces usaremos el de pruebas resend)
app.mail.from=onboarding@resend.dev