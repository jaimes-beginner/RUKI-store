spring.application.name=order
server.port=8082

# --- BASE DE DATOS ---
spring.datasource.url=${DB_URL:jdbc:postgresql://db.vjimgzqcvmevoqorpkfk.supabase.co:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Y SEGURIDAD ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# --- COMUNICACIÓN CON OTROS MICROSERVICIOS (FEIGN) ---
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000
app.clients.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}
app.clients.user-service.url=${USER_SERVICE_URL:http://localhost:8080}
app.clients.order-service.url=${ORDER_SERVICE_URL:http://localhost:8082}

server.forward-headers-strategy=framework

# --- STRIPE CONFIGURATION ---
stripe.api.key=${STRIPE_SECRET_KEY}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# --- MAIL | RESEND API CONFIGURATION ---
spring.mail.password=${MAIL_PASSWORD}
app.mail.from=onboarding@resend.dev

# --- JACKSON (Serialización) ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss.SSSSSS
spring.jackson.deserialization.fail-on-unknown-properties=true