spring.application.name=order
server.port=8082

# --- BASE DE DATOS ---
spring.datasource.url=${DB_URL:jdbc:postgresql://db.vjimgzqcvmevoqorpkfk.supabase.co:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Y SEGURIDAD ---
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# Dinámico: En la nube usará tu URL de Vercel/Netlify, en PC usará localhost
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# --- COMUNICACIÓN CON OTROS MICROSERVICIOS (FEIGN) ---
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000
# Dinámico: En la nube leerá la URL del servidor de Productos
app.clients.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}